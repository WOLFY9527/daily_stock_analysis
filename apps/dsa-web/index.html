<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/wolfystock-logo-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dsa-web</title>
    <script>
      (() => {
        const rootTheme = 'spacex';
        document.documentElement.dataset.theme = rootTheme;
        document.documentElement.dataset.colorMode = 'dark';
        document.documentElement.style.setProperty('--preboot-bg', '#000000');
      })();
    </script>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--preboot-bg, #000000);
      }
      #root {
        min-height: 100vh;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, rgba(6, 6, 9, 1) 0%, rgba(0, 0, 0, 1) 100%);
        transition:
          opacity 0.38s ease,
          visibility 0.38s ease;
      }
      #boot-splash.is-fading {
        opacity: 0;
        visibility: hidden;
      }
      .boot-splash-fallback__inner {
        width: min(92vw, 360px);
        text-align: center;
      }
      .boot-splash-fallback__text {
        margin: 0;
        font:
          700 12px/1.2 "D-DIN", "DIN Alternate", "Arial Narrow", "Inter", "Segoe UI", system-ui,
          sans-serif;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(240, 240, 250, 0.92);
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-splash-fallback__inner">
        <p class="boot-splash-fallback__text">Loading WolfyStock...</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
