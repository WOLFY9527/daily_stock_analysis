<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="1024x1024" href="/wolfystock-logo-mark.png" />
    <link rel="shortcut icon" href="/wolfystock-logo-mark.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WolfyStock</title>
    <script>
      (() => {
        const rootTheme = 'spacex';
        document.documentElement.dataset.theme = rootTheme;
        document.documentElement.dataset.colorMode = 'dark';
        document.documentElement.style.setProperty('--preboot-bg', '#000000');
      })();
    </script>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--preboot-bg, #000000);
      }
      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
