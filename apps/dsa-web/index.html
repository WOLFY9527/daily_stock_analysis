<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="1024x1024" href="/wolfystock-logo-mark.png" />
    <link rel="shortcut icon" href="/wolfystock-logo-mark.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WolfyStock</title>
    <script>
      (() => {
        const rootTheme = 'spacex';
        document.documentElement.dataset.theme = rootTheme;
        document.documentElement.dataset.colorMode = 'dark';
        document.documentElement.style.setProperty('--preboot-bg', '#000000');
      })();
    </script>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--preboot-bg, #000000);
      }
      #root {
        min-height: 100vh;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, rgba(6, 6, 9, 1) 0%, rgba(0, 0, 0, 1) 100%);
        transition:
          opacity 0.38s ease,
          visibility 0.38s ease;
      }
      #boot-splash.is-fading {
        opacity: 0;
        visibility: hidden;
      }
      .boot-splash-fallback__inner {
        width: min(92vw, 420px);
        text-align: center;
      }
      .boot-splash-fallback__logo-wrap {
        position: relative;
        width: clamp(136px, 30vw, 184px);
        aspect-ratio: 1;
        margin: 0 auto;
      }
      .boot-splash-fallback__ring {
        position: absolute;
        inset: 10%;
        border-radius: 999px;
        border: 1px solid rgba(255, 91, 126, 0.18);
        box-shadow: 0 0 22px rgba(255, 91, 126, 0.12);
      }
      .boot-splash-fallback__ring--secondary {
        inset: 18%;
        border-color: rgba(78, 243, 209, 0.14);
        box-shadow: 0 0 22px rgba(78, 243, 209, 0.1);
      }
      .boot-splash-fallback__logo {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter:
          drop-shadow(0 0 18px rgba(255, 91, 126, 0.16))
          drop-shadow(0 0 22px rgba(78, 243, 209, 0.14));
      }
      .boot-splash-fallback__wordmark {
        margin: 1rem 0 0;
        font:
          700 clamp(1.8rem, 5vw, 2.5rem) / 1 "D-DIN", "DIN Alternate", "Arial Narrow", "Inter", "Segoe UI",
          system-ui, sans-serif;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        background: linear-gradient(92deg, #ff6d8e 0%, #ffeef1 44%, #73f7dc 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }
      .boot-splash-fallback__market {
        margin: 0.4rem 0 0;
        font:
          700 10px/1.2 "Inter", "Segoe UI", system-ui,
          sans-serif;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(240, 240, 250, 0.46);
      }
      .boot-splash-fallback__text {
        margin: 0;
        font:
          700 12px/1.2 "D-DIN", "DIN Alternate", "Arial Narrow", "Inter", "Segoe UI", system-ui,
          sans-serif;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(240, 240, 250, 0.92);
      }
      .boot-splash-fallback__copy {
        margin-top: 1rem;
      }
      .boot-splash-fallback__progress {
        position: relative;
        width: min(240px, 74vw);
        height: 3px;
        margin: 1rem auto 0;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(240, 240, 250, 0.08);
      }
      .boot-splash-fallback__progress-bar {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        width: 40%;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(255, 84, 124, 0.16) 0%, #ff5a7e 22%, #8dfade 76%, rgba(83, 244, 210, 0.12) 100%);
        animation: bootSplashFallbackProgress 1.55s linear infinite;
      }
      @keyframes bootSplashFallbackProgress {
        0% {
          transform: translateX(-72%);
        }
        100% {
          transform: translateX(180%);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-splash-fallback__inner">
        <div class="boot-splash-fallback__logo-wrap">
          <span class="boot-splash-fallback__ring"></span>
          <span class="boot-splash-fallback__ring boot-splash-fallback__ring--secondary"></span>
          <img class="boot-splash-fallback__logo" src="/wolfystock-logo-mark.png" alt="WolfyStock logo" />
        </div>
        <p class="boot-splash-fallback__wordmark">WolfyStock</p>
        <p class="boot-splash-fallback__market">US • HK • CN</p>
        <div class="boot-splash-fallback__copy">
          <p class="boot-splash-fallback__text">Loading WolfyStock...</p>
          <div class="boot-splash-fallback__progress" aria-hidden="true">
            <span class="boot-splash-fallback__progress-bar"></span>
          </div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
